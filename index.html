<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Short+Stack&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="connect.js" defer></script>
    <title>TinyLink</title>
  </head>
  <body>
    <div class="window">
        <h1 id="title">TinyLink</h1>
        <div class="input-group">
            <label for="your-code">Your Code</label>
            <input type="text" id="your-code" name="your-code" readonly placeholder="connecting…">
        </div>
        <div class="input-group">
            <label for="friend-code">Friend Code</label>
            <input type="text" id="friend-code" name="friend-code" placeholder="e.g. A8X3F2" maxlength="6" autocapitalize="characters">
        </div>
        <button id="connect-button">Link</button>
        <p id="status"></p>
        <p id="hint">Tip: click &amp; hold your character to move it, scroll while holding to resize</p>
    </div>
  </body>
</html>
